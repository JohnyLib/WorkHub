<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | WorkBridge UK</title>
  <meta name="theme-color" content="#2563EB">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 2rem;
    }
    svg {
      width: 80px;
      height: 80px;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #1e293b;
    }
    p {
      color: #64748b;
      line-height: 1.5;
      margin: 0 0 2rem 0;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 2l20 20M8.5 2.5a20.4 20.4 0 0 1 7 0M16.14 16.14a20.4 20.4 0 0 1-8.28 0M12 20a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
    </svg>
    <h1>You are offline</h1>
    <p>It seems you've lost your internet connection. We'll automatically reconnect you when you're back online.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
